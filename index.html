  document.getElementById('t1').className = `tab${v==='client' ? ' on' : ''}`;
  document.getElementById('t2').className = `tab${v==='admin' ? ' on' : ''}`;
  render();
}
function render(){
  if(V.view === 'client'){
    document.getElementById('mc').innerHTML = rclient();
  } else {
    document.getElementById('mc').innerHTML = adminAuth ? radmin() : rAdminGate();
  }
}

/* ===================== ADMIN GATE ===================== */
function rAdminGate(){
  return `<div class="gatewrap"><div class="gatecard">
    <div class="gate-ico"><i class="ti ti-lock" aria-hidden="true"></i></div>
    <div class="gate-tt">Acesso restrito</div>
    <div class="gate-tx">Digite o código de liberação para acessar o painel administrativo do seu negócio.</div>
    <input class="gate-input" id="gateInput" placeholder="AF-XXXX-XXXX" maxlength="20" onkeypress="if(event.key==='Enter')checkGateCode()"/>
    ${ED.gateErr ? `<div class="gate-err">${ED.gateErr}</div>` : ''}
    <button class="btnpx" onclick="checkGateCode()"><i class="ti ti-shield-check" aria-hidden="true"></i> Acessar painel</button>
    <div class="gate-hint"><i class="ti ti-info-circle" aria-hidden="true"></i> Os códigos de liberação são pessoais e intransferíveis, fornecidos apenas pelo administrador do sistema. Não são exibidos publicamente nesta tela.</div>
  </div></div>`;
}
function checkGateCode(){
  const raw = document.getElementById('gateInput').value;
  const norm = raw.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  if(NORM_CODES.has(norm)){
    adminAuth = true; ED.gateErr=''; render();
  } else {
    ED.gateErr = 'Código inválido. Verifique e tente novamente.';
    render();
    setTimeout(() => { const el=document.getElementById('gateInput'); if(el) el.focus(); }, 0);
  }
}
function logoutAdmin(){ adminAuth = false; render(); }

/* ===================== CALENDAR ===================== */
function rclient(){
  const m=V.m, y=V.y, sd=fday(m,y), nd=dimonth(m,y), pdm=dimonth(m===0?11:m-1, m===0?y-1:y), tds=tstr();
  const lbls = WDS.map((w,i) => `<div class="dlbl${i===0||i===6?' we':''}">${w}</div>`).join('');
  let cells = '';
  for(let i=0;i<sd;i++) cells += `<div class="dc ot"><span class="n">${pdm-sd+i+1}</span></div>`;
  for(let d=1; d<=nd; d++){
    const dtx = dstr(y,m,d), dow = new Date(y,m,d).getDay(), cnt = bksOn(dtx).length;
    const past = dtx < tds, closed = V.workDays[dow]===0, full = cnt>=8, isTod = dtx===tds;
    let c = 'dc';
    if(past) c += ' past';
    else if(closed || full) c += ' bzy';
    else c += ' avl';
    if(isTod && !past) c += ' tday';
    const ck = (!past && !closed && !full) ? ` onclick="openBooking('${dtx}')"` : '';
    cells += `<div class="${c}"${ck}><span class="n">${d}</span>${cnt>0 && !past ? '<span class="bd"></span>' : ''}</div>`;
  }
  const tot=sd+nd, tr = tot%7===0 ? 0 : 7-(tot%7);
  for(let t=1;t<=tr;t++) cells += `<div class="dc ot"><span class="n">${t}</span></div>`;
  return `<div class="ca"><div class="cc">
    <div class="cnav"><span class="cml">${MNS[m]} ${y}</span><div class="cnbs">
      <button class="cnb" onclick="chM(-1)"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <button class="cnb" onclick="chM(1)"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div></div>
    <div class="cgrid">${lbls}${cells}</div></div>
    <div class="lgnd">
      <div class="li"><div class="ld" style="background:#1D9E75"></div>Disponível</div>
      <div class="li"><div class="ld" style="background:#9FE1CB"></div>Com agendamentos</div>
      <div class="li"><div class="ld" style="background:#C7D1CD"></div>Indisponível / cheio</div>
    </div>
    <div class="hintcard"><i class="ti ti-hand-click" aria-hidden="true"></i> Clique em qualquer dia disponível para abrir a janela de agendamento. Todos os 7 dias da semana ficam disponíveis conforme configurado pelo admin.</div>
  </div>`;
}
function chM(d){ V.m+=d; if(V.m>11){V.m=0;V.y++;} if(V.m<0){V.m=11;V.y--;} render(); }

/* ===================== BOOKING MODAL ===================== */
function openBooking(dateStr){
  BK = {open:true, step:1, date:dateStr, slot:null, svcId:null, nm:'', cpf:'', wh:'', em:'', obs:'', pay:'partial', paidAmt:0, err:''};
  renderBK();
}
function closeBK(){ BK.open=false; document.getElementById('ml').innerHTML=''; }
function fmtDateLong(ds){
  const p = ds.split('-'); const dt = new Date(+p[0], +p[1]-1, +p[2]);
  return dt.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
}
function stepDots(){
  const labels = ['Horário','Serviço','Dados','Pagamento','Pronto'];
  let html = '<div class="steps5">';
  for(let i=1;i<=5;i++){
    const cls = i<BK.step ? 's5 dn' : i===BK.step ? 's5 act' : 's5';
    const dotContent = i<BK.step ? '<i class="ti ti-check" aria-hidden="true"></i>' : i;
    html += `<div class="${cls}"><div class="s5dot">${dotContent}</div><span class="s5lbl">${labels[i-1]}</span></div>`;
    if(i<5) html += `<div class="s5line${i<BK.step?' on':''}"></div>`;
  }
  html += '</div>';
  return html;
}
function renderBK(){
  if(!BK.open) return;
  const dl = fmtDateLong(BK.date);
  let body = '';
  if(BK.step===1) body = bkStep1(dl);
  else if(BK.step===2) body = bkStep2();
  else if(BK.step===3) body = bkStep3();
  else if(BK.step===4) body = bkStep4();
  else body = bkStep5(dl);
  document.getElementById('ml').innerHTML = `<div class="mov" onclick="if(event.target===this)closeBK()"><div class="mbox">
    <div class="mhead"><button class="mxb" onclick="closeBK()"><i class="ti ti-x" aria-hidden="true"></i></button>
      <div class="mhead-t"><i class="ti ti-calendar-event" aria-hidden="true"></i> Novo Agendamento</div>
      ${stepDots()}
    </div><div class="mbody">${body}</div>
  </div></div>`;
}
function bkStep1(dl){
  const taken = bksOn(BK.date).map(b=>b.sl);
  const slots = SLS.map(s => {
    const tk = taken.includes(s), on = s===BK.slot;
    const cls = `st2${tk?' tk2':''}${on?' on2':''}`;
    const cl = tk ? '' : ` onclick="pickSlot('${s}')"`;
    return `<div class="${cls}"${cl}>${s}</div>`;
  }).join('');
  return `<div class="minfo"><div class="minfo-t" style="text-transform:capitalize"><i class="ti ti-calendar" aria-hidden="true"></i> ${dl}</div></div>
    <div class="slbl2">Escolha o horário</div><div class="sg2">${slots}</div>
    ${BK.err ? `<div class="errbox">${BK.err}</div>` : ''}
    <button class="btnpx" onclick="bkNext1()">Continuar <i class="ti ti-arrow-right" aria-hidden="true"></i></button>`;
}
function pickSlot(s){ BK.slot=s; BK.err=''; renderBK(); }
function bkNext1(){ if(!BK.slot){ BK.err='Selecione um horário para continuar.'; renderBK(); return; } BK.step=2; renderBK(); }

function bkStep2(){
  const cards = V.svcs.map(sv => {
    const pmTxt = sv.pm==='none' ? 'Pagamento no dia' : sv.pm==='full' ? '100% antecipado via Pix' : '40% antecipado via Pix';
    return `<div class="svc2" onclick="pickSvc(${sv.id})">
      <div><div class="svc2-n">${sv.n}</div><div class="svc2-m"><i class="ti ti-clock" aria-hidden="true"></i> ${sv.d} min · ${pmTxt}</div></div>
      <div class="svc2-p">R$ ${sv.p.toFixed(2)}</div></div>`;
  }).join('');
  return `<div class="slbl2">Escolha o serviço</div>${cards}<button class="btngx" onclick="bkBack(1)">Voltar</button>`;
}
function pickSvc(id){ BK.svcId=id; BK.step=3; renderBK(); }

function bkStep3(){
  return `<div class="frow2">
    <div class="fg2"><label>Nome completo</label><input id="bkn" value="${BK.nm}" placeholder="Maria da Silva"/></div>
    <div class="fg2"><label>CPF</label><input id="bkc" value="${BK.cpf}" placeholder="000.000.000-00" maxlength="14" oninput="fCpf(this)"/></div>
    </div>
    <div class="frow2">
    <div class="fg2"><label>WhatsApp</label><input id="bkw" value="${BK.wh}" placeholder="(11) 99999-9999" maxlength="16" oninput="fPh(this)"/></div>
    <div class="fg2"><label>E-mail</label><input id="bke" value="${BK.em}" placeholder="nome@email.com" type="email"/></div>
    </div>
    <div class="fg2"><label>Observações (opcional)</label><textarea id="bko" rows="2" placeholder="Preferências ou anotações...">${BK.obs}</textarea></div>
    ${BK.err ? `<div class="errbox">${BK.err}</div>` : ''}
    <button class="btnpx" onclick="bkNext3()">Continuar <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    <button class="btngx" onclick="bkBack(2)">Voltar</button>`;
}
function bkNext3(){
  const nm = document.getElementById('bkn').value.trim();
  const cpf = document.getElementById('bkc').value.trim();
  const wh = document.getElementById('bkw').value.trim();
  if(!nm || !cpf || !wh){ BK.err='Preencha nome, CPF e WhatsApp para continuar.'; renderBK(); return; }
  BK.nm=nm; BK.cpf=cpf; BK.wh=wh;
  BK.em = document.getElementById('bke').value.trim();
  BK.obs = document.getElementById('bko').value.trim();
  BK.err='';
  BK.step=4; renderBK();
}

function bkStep4(){
  const sv = V.svcs.find(x=>x.id===BK.svcId);
  if(sv.pm==='none'){
    return `<div class="errbox" style="background:#F4F6F5;border-color:#E3E8E6;color:#5C6E69"><i class="ti ti-info-circle" aria-hidden="true"></i> Este serviço não exige pagamento antecipado. O valor será cobrado no dia do atendimento.</div>
      <div class="totalrow"><span>A pagar agora</span><span>R$ 0,00</span></div>
      <button class="btnpx" onclick="bkConfirmPay(0)">Confirmar agendamento <i class="ti ti-check" aria-hidden="true"></i></button>
      <button class="btngx" onclick="bkBack(3)">Voltar</button>`;
  }
  if(sv.pm==='full'){
    return `${pixBlock(sv.p.toFixed(2), sv.n)}
      <div class="totalrow"><span>Total via Pix</span><span>R$ ${sv.p.toFixed(2)}</span></div>
      <button class="btnpx" onclick="bkConfirmPay(${sv.p})">Confirmei o pagamento <i class="ti ti-check" aria-hidden="true"></i></button>
      <button class="btngx" onclick="bkBack(3)">Voltar</button>`;
  }
  const pt = sv.p*0.4, ft = sv.p, amt = BK.pay==='full' ? ft : pt;
  return `<div class="popts2">
    <div class="popt2${BK.pay==='partial'?' on2':''}" onclick="bkPay('partial')"><div class="ptit2">40% agora</div><div class="pval2">R$ ${pt.toFixed(2)}</div><div class="phin2">+ R$ ${(sv.p*0.6).toFixed(2)} no dia</div></div>
    <div class="popt2${BK.pay==='full'?' on2':''}" onclick="bkPay('full')"><div class="ptit2">100% agora</div><div class="pval2">R$ ${ft.toFixed(2)}</div><div class="phin2">Nada a pagar no dia</div></div>
    </div>
    ${pixBlock(amt.toFixed(2), sv.n)}
    <div class="totalrow"><span>A pagar via Pix</span><span>R$ ${amt.toFixed(2)}</span></div>
    <button class="btnpx" onclick="bkConfirmPay(${amt})">Confirmei o pagamento <i class="ti ti-check" aria-hidden="true"></i></button>
    <button class="btngx" onclick="bkBack(3)">Voltar</button>`;
}
function bkPay(opt){ BK.pay=opt; renderBK(); }
function pixBlock(amt, lbl){
  let rects = '';
  for(let i=0;i<24;i++){ if(Math.random()>0.42) rects += `<rect x="${28+(i%5)*8}" y="${28+Math.floor(i/5)*8}" width="7" height="7" fill="#0F6E56" rx="1"/>`; }
  const qr = `<svg width="96" height="96" viewBox="0 0 84 84" xmlns="http://www.w3.org/2000/svg"><rect width="84" height="84" fill="white" rx="4"/>
    <rect x="2" y="2" width="22" height="22" fill="none" stroke="#0F6E56" stroke-width="2.5" rx="2"/><rect x="7" y="7" width="12" height="12" fill="#0F6E56" rx="1"/>
    <rect x="60" y="2" width="22" height="22" fill="none" stroke="#0F6E56" stroke-width="2.5" rx="2"/><rect x="65" y="7" width="12" height="12" fill="#0F6E56" rx="1"/>
    <rect x="2" y="60" width="22" height="22" fill="none" stroke="#0F6E56" stroke-width="2.5" rx="2"/><rect x="7" y="65" width="12" height="12" fill="#0F6E56" rx="1"/>
    ${rects}</svg>`;
  return `<div class="pixb2"><div style="font-size:13px;font-weight:700;color:#0F6E56"><i class="ti ti-qrcode" aria-hidden="true"></i> Pague via Pix</div>
    <div class="pixqr2">${qr}</div><div class="pixamt2">R$ ${amt}</div><div class="pixlb2">${lbl}</div>
    <div class="pixk2" onclick="copyText('agenda.flow@pix.com.br');alert('Chave copiada: agenda.flow@pix.com.br')"><i class="ti ti-copy" aria-hidden="true"></i> agenda.flow@pix.com.br</div></div>`;
}
function bkConfirmPay(amt){
  BK.paidAmt = amt;
  V.bks.push({id:V.nid++, dt:BK.date, sl:BK.slot, nm:BK.nm, cpf:BK.cpf, ct:BK.wh, si:BK.svcId, pd: amt>0});
  BK.step=5; renderBK();
}
function bkStep5(dl){
  const sv = V.svcs.find(x=>x.id===BK.svcId);
  return `<div class="cof2"><div class="cof2-ico"><i class="ti ti-check" aria-hidden="true"></i></div>
    <div class="cof2-tt">Agendamento confirmado!</div>
    <div class="cof2-tx">Você receberá a confirmação pelo WhatsApp informado. Até breve!</div>
    <div class="cof2-crd">
      <div class="cr2"><span>Serviço</span><b>${sv.n}</b></div>
      <div class="cr2"><span>Data</span><b style="text-transform:capitalize">${dl}</b></div>
      <div class="cr2"><span>Horário</span><b>${BK.slot}</b></div>
      <div class="cr2"><span>Nome</span><b>${BK.nm}</b></div>
      <div class="cr2"><span>CPF</span><b>${BK.cpf}</b></div>
      <div class="cr2"><span>Pagamento</span><b>${BK.paidAmt>0 ? 'R$ '+BK.paidAmt.toFixed(2)+' via Pix' : 'No dia do atendimento'}</b></div>
    </div>
    <button class="btnpx" onclick="closeBK();render()">Concluir</button></div>`;
}
function bkBack(s){ BK.step=s; BK.err=''; renderBK(); }

/* ===================== ADMIN DASHBOARD ===================== */
function radmin(){
  const tot=V.bks.length, pd=V.bks.filter(b=>b.pd).length, pend=tot-pd;
  const rev=V.bks.filter(b=>b.pd).reduce((s,b)=>{ const sv=V.svcs.find(x=>x.id===b.si); return s+(sv ? sv.p*(sv.pm==='full'?1:0.4) : 0); },0);
  const svcRows = V.svcs.map(sv => {
    const pmTxt = sv.pm==='none' ? 'Sem antecipação' : sv.pm==='full' ? '100% via Pix' : '40% via Pix';
    return `<div class="aitem"><div><div class="ain">${sv.n}</div><div class="aim">${sv.d} min · R$ ${sv.p.toFixed(2)} · ${pmTxt}</div></div>
      <div class="aibtns"><button class="aibb" onclick="openEditService(${sv.id})"><i class="ti ti-pencil" aria-hidden="true"></i> Editar</button>
      <button class="aibb dl" onclick="deleteService(${sv.id})"><i class="ti ti-trash" aria-hidden="true"></i></button></div></div>`;
  }).join('');
  const bkRows = V.bks.slice().reverse().map(b => {
    const sv = V.svcs.find(x=>x.id===b.si);
    const p = b.dt.split('-'); const dt = new Date(+p[0], +p[1]-1, +p[2]);
    return `<tr><td>${dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</td><td><strong>${b.nm.split(' ')[0]}</strong></td><td>${sv?sv.n:'—'}</td><td>${b.sl}</td><td>${b.pd?'<span class="bdg bge">Pago</span>':'<span class="bdg bga">Pendente</span>'}</td></tr>`;
  }).join('');
  const dayToggles = WDS.map((w,i) => {
    const on = V.workDays[i]===1;
    return `<button class="dwbtn" onclick="toggleWorkDay(${i})" style="background:${on?'#1D9E75':'var(--color-background-secondary)'};color:${on?'#fff':'var(--color-text-secondary)'}">${w.slice(0,1)}</button>`;
  }).join('');
  return `<div class="adm">
    <div class="admtop"><div class="sessrow"><i class="ti ti-shield-check" aria-hidden="true" style="color:#1D9E75"></i> Sessão de administrador ativa</div>
    <button class="aibb" onclick="logoutAdmin()"><i class="ti ti-logout" aria-hidden="true"></i> Sair</button></div>
    <div class="astrow">
      <div class="ast"><div class="al"><i class="ti ti-calendar" aria-hidden="true"></i> Total agendados</div><div class="av">${tot}</div></div>
      <div class="ast"><div class="al"><i class="ti ti-check" aria-hidden="true"></i> Confirmados</div><div class="av">${pd}</div></div>
      <div class="ast"><div class="al"><i class="ti ti-clock" aria-hidden="true"></i> Pendentes</div><div class="av">${pend}</div></div>
      <div class="ast"><div class="al"><i class="ti ti-currency-dollar" aria-hidden="true"></i> Recebido Pix</div><div class="av">R$ ${Math.round(rev)}</div></div>
    </div>
    <div class="a2c">
      <div class="acd"><h3>Serviços cadastrados</h3>${svcRows}
        <button class="addb" onclick="openAddService()"><i class="ti ti-plus" aria-hidden="true"></i> Adicionar serviço</button></div>
      <div class="acd"><h3>Agendamentos recentes</h3>
        <div style="overflow-x:auto"><table class="atable"><thead><tr><th>Data</th><th>Cliente</th><th>Serviço</th><th>Hora</th><th>Status</th></tr></thead><tbody>${bkRows}</tbody></table></div></div>
    </div>
    <div class="a2c">
      <div class="acd"><h3>Dias de funcionamento</h3>
        <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:11px">Clique para ativar/desativar — afeta diretamente o calendário do cliente.</p>
        <div style="display:flex;gap:7px;flex-wrap:wrap">${dayToggles}</div>
        <div class="fg2" style="margin-top:15px"><label>Abertura</label><input type="time" value="08:00"/></div>
        <div class="fg2"><label>Fechamento</label><input type="time" value="18:00"/></div>
        <button class="btnpx" onclick="alert('Horário salvo!')">Salvar horário</button></div>
      <div class="acd"><h3>Dados do negócio</h3>
        <div class="fg2"><label>Nome do negócio</label><input value="Meu Negócio"/></div>
        <div class="fg2"><label>Chave Pix</label><input value="agenda.flow@pix.com.br"/></div>
        <div class="fg2"><label>Intervalo entre horários</label><select><option>30 min</option><option selected>60 min</option></select></div>
        <button class="btnpx" onclick="alert('Dados salvos!')">Salvar dados</button></div>
    </div>
  </div>`;
}
function toggleWorkDay(i){ V.workDays[i] = V.workDays[i]===1 ? 0 : 1; render(); }

function openAddService(){ ED = {mode:'add', id:null, err:''}; renderED(); }
function openEditService(id){
  const sv = V.svcs.find(x=>x.id===id);
  ED = {mode:'edit', id:id, n:sv.n, d:sv.d, p:sv.p, pm:sv.pm, err:''};
  renderED();
}
function closeED(){ document.getElementById('ml').innerHTML=''; }
function renderED(){
  const isEdit = ED.mode==='edit';
  const n = isEdit ? ED.n : '', d = isEdit ? ED.d : 60, p = isEdit ? ED.p : 100, pm = isEdit ? ED.pm : 'partial';
  document.getElementById('ml').innerHTML = `<div class="mov" onclick="if(event.target===this)closeED()"><div class="mbox">
    <div class="mhead"><button class="mxb" onclick="closeED()"><i class="ti ti-x" aria-hidden="true"></i></button>
      <div class="mhead-t"><i class="ti ti-${isEdit?'pencil':'plus'}" aria-hidden="true"></i> ${isEdit?'Editar serviço':'Novo serviço'}</div></div>
    <div class="mbody">
      <div class="fg2"><label>Nome do serviço</label><input id="edn" value="${n}" placeholder="Ex: Corte de Cabelo"/></div>
      <div class="frow2">
        <div class="fg2"><label>Duração (min)</label><input id="edd" type="number" value="${d}"/></div>
        <div class="fg2"><label>Preço (R$)</label><input id="edp" type="number" value="${p}"/></div>
      </div>
      <div class="fg2"><label>Pagamento antecipado</label><select id="edpm">
        <option value="none"${pm==='none'?' selected':''}>Sem antecipação</option>
        <option value="partial"${pm==='partial'?' selected':''}>40% via Pix</option>
        <option value="full"${pm==='full'?' selected':''}>100% via Pix</option>
      </select></div>
      ${ED.err ? `<div class="errbox">${ED.err}</div>` : ''}
      <button class="btnpx" onclick="saveED()"><i class="ti ti-device-floppy" aria-hidden="true"></i> ${isEdit?'Salvar alterações':'Adicionar serviço'}</button>
      <button class="btngx" onclick="closeED()">Cancelar</button>
    </div>
  </div></div>`;
}
function saveED(){
  const n = document.getElementById('edn').value.trim();
  const d = parseInt(document.getElementById('edd').value) || 60;
  const p = parseFloat(document.getElementById('edp').value) || 0;
  const pm = document.getElementById('edpm').value;
  if(!n){ ED.err='Informe o nome do serviço.'; renderED(); return; }
  if(p<=0){ ED.err='Informe um preço válido.'; renderED(); return; }
  if(ED.mode==='add'){
    V.svcs.push({id:V.nid++, n:n, d:d, p:p, pm:pm});
  } else {
    const sv = V.svcs.find(x=>x.id===ED.id);
    sv.n=n; sv.d=d; sv.p=p; sv.pm=pm;
  }
  closeED(); render();
}
function deleteService(id){
  if(!confirm('Remover este serviço? Esta ação não pode ser desfeita.')) return;
  V.svcs = V.svcs.filter(x=>x.id!==id);
  render();
}

/* ===================== HELPERS ===================== */
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.left='-9999px';
